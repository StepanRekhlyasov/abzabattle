version: '3.8'

services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: abzabattle
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uapp", "-papp"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      target: ${APP_MODE:-dev-stage}
    develop:
      watch: 
      - action: rebuild
        path: ./backend
        ignore:
          - ./backend/obj/
          - ./backend/bin/
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=task4;User=app;Password=app;
      - App__PublicUrl=https://abzabza.ru
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: ${APP_MODE:-dev-stage}
    develop:
      watch:
        - path: ./frontend/src
          target: /app/src
          action: sync
        - path: ./frontend/package.json
          target: /app/package.json
          action: restart
        - path: ./frontend/vite.config.mts
          target: /app/vite.config.mts
          action: restart
    expose:
      - "80"
    depends_on:
      - backend

  phpmyadmin:
    build: ./phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: app
      PMA_PASSWORD: app
      PMA_ABSOLUTE_URI: http://localhost:8000/phpmyadmin/
    depends_on:
      mysql:
        condition: service_healthy

  gateway:
    image: nginx:stable-alpine
    ports:
      - "8000:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - phpmyadmin

volumes:
  mysql_data:
